# Nginx конфигурация для Next.js Portfolio с SSL
# Путь: /etc/nginx/sites-available/portfolio
# Сайт: /var/www/site/portfolio
# Домены: nice-sites.ru, nice-sites.online

upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Редирект HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    
    server_name nice-sites.ru www.nice-sites.ru nice-sites.online www.nice-sites.online;
    
    # Для Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS сервер для nice-sites.ru
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name nice-sites.ru www.nice-sites.ru;
    
    # SSL сертификаты (Certbot автоматически создаст)
    ssl_certificate /etc/letsencrypt/live/nice-sites.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nice-sites.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/nice-sites.ru/chain.pem;
    
    # SSL настройки
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # Современные протоколы
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Логи
    access_log /var/log/nginx/portfolio_access.log;
    error_log /var/log/nginx/portfolio_error.log;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Статические файлы Next.js (кэширование на 1 год)
    location /_next/static {
        alias /var/www/site/portfolio/.next/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Публичные файлы
    location /public {
        alias /var/www/site/portfolio/public;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon и статика из public
    location ~* ^/(favicon\.svg|favicon\.ico|icon\.svg|robots\.txt|sitemap\.xml) {
        root /var/www/site/portfolio/public;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Основной проксирование к Next.js
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API routes
    location /api {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Для API отключаем буферизацию (стриминг)
        proxy_buffering off;
    }

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

